<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>

    <div th:replace="fragmentos/navbar :: navbar"></div>

    <div class="dashboard-wrap">
        <div class="layout">

            <!-- Sidebar -->
            <aside class="sidebar">
                <h4 class="sidebar-title">Admin</h4>

                <ul class="nav flex-column">

                    <li class="nav-item" sec:authorize="hasRole('PUBLICADOR')">
                        <a class="nav-link fw-bold" href="#" onclick="cargarContenido(event, '/libros/nuevo')">
                            <i class="bi bi-book me-2"></i> Nuevo Libro
                        </a>
                    </li>

                    <li class="nav-item" sec:authorize="hasRole('PUBLICADOR')">
                        <a class="nav-link fw-bold" href="#"
                            onclick="cargarContenido(event, '/admin/novedades/nuevo')">
                            <i class="bi bi-folder-plus me-2"></i> Nueva Novedad
                        </a>
                    </li>

                    <li class="nav-item" sec:authorize="hasRole('PUBLICADOR')">
                        <a class="nav-link fw-bold" href="#"
                            onclick="cargarContenido(event, '/admin/noticias/nuevo')">
                            <i class="bi bi-newspaper me-2"></i> Nueva Noticia
                        </a>
                    </li>

                </ul>
            </aside>

            <!-- Main -->
            <main class="main-content">
                <div id="contenido-dinamico">
                    <h1 class="page-title">Bienvenido al Dashboard</h1>
                    <p class="text-muted mb-0">
                        Selecciona una opción del menú para administrar el sistema.
                    </p>
                </div>
            </main>

        </div>
    </div>

    <script>
        function cargarContenido(e, url) {
            e.preventDefault(); // evita salto por #
            fetch(url, { headers: { "X-Requested-With": "XMLHttpRequest" } })
                .then(r => r.text())
                .then(html => {
                    document.getElementById("contenido-dinamico").innerHTML = html;
                })
                .catch(err => console.error("Error cargando contenido:", err));
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
