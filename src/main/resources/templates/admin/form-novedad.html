<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${tituloPagina}">Gestión de Novedades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/ui-github.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/formadmin.css}">
</head>
<body>



    <div class="card-github">

        <div class="card-github-header">
            <h2 class="m-0" th:text="${tituloPagina}">Formulario de Novedad</h2>
        </div>

        <div class="p-4">

            <form th:action="@{/admin/novedades/guardar}" th:object="${tarjetaNovedad}" method="post">

                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" class="form-control github-input" th:field="*{titulo}"
                        th:errorclass="is-invalid" />
                    <div class="invalid-feedback" th:errors="*{titulo}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción Breve</label>
                    <input type="text" class="form-control github-input" th:field="*{descripcion}"
                        th:errorclass="is-invalid" />
                    <div class="invalid-feedback" th:errors="*{descripcion}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Apartado (Identificador único, ej: 'comics', 'cine')
                    </label>
                    <input type="text" class="form-control github-input" th:field="*{apartado}"
                        placeholder="Sin espacios ni tildes" th:errorclass="is-invalid" />
                    <div class="invalid-feedback" th:errors="*{apartado}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">URL Imagen</label>
                    <input type="text" class="form-control github-input" th:field="*{imagen}"
                        th:errorclass="is-invalid" />
                    <div class="invalid-feedback" th:errors="*{imagen}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Vincular con un Libro (Opcional)
                    </label>

                    <select class="form-select github-input" th:field="*{libro}">
                        <option value="">-- Ninguno --</option>
                        <option th:each="l : ${libros}" th:value="${l.id}" th:text="${l.titulo}">
                        </option>
                    </select>

                    <div class="form-text">
                        Si seleccionas un libro, la novedad enlazará a él.
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/novedades}" class="btn btn-outline-secondary github-btn-outline">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-libreria">
                        Guardar Novedad
                    </button>
                </div>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
