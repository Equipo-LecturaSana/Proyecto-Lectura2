<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${tituloPagina}">Gestión de Noticias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/formadmin.css}">
</head>

<body>


    <div class="card-github">

        <div class="card-github-header">
            <h2 class="m-0" th:text="${tituloPagina}">Formulario de Noticia</h2>
        </div>

        <div class="p-4">

            <div th:if="${mensajeError}" class="alert alert-danger mb-4" th:text="${mensajeError}">
            </div>

            <form action="/admin/noticias/guardar" method="post">

                <input type="hidden" name="id" th:value="${noticia.id}" />

                <div class="mb-3">
                    <label class="form-label">Título de la Noticia</label>
                    <input type="text" class="form-control github-input" name="titulo" th:value="${noticia.titulo}"
                        required />
                </div>

                <div class="mb-3">
                    <label class="form-label">Subtítulo / Descripción</label>
                    <input type="text" class="form-control github-input" name="descripcion"
                        th:value="${noticia.descripcion}" required />
                </div>

                <div class="mb-3">
                    <label class="form-label">Contenido Completo</label>
                    <textarea class="form-control github-input" name="contenido" rows="5" required
                        th:text="${noticia.contenido}">
                </textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Pertenece a la Novedad (Categoría):
                    </label>

                    <select class="form-select github-input" name="tarjetaId" required>

                        <option value="">-- Seleccione una Novedad --</option>

                        <option th:each="t : ${tarjetas}" th:value="${t.id}"
                            th:text="${t.titulo + ' (Slug: ' + t.apartado + ')'}"
                            th:selected="${noticia.tarjetaNovedad != null and noticia.tarjetaNovedad.id == t.id}">
                        </option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">URL Imagen</label>
                    <input type="text" class="form-control github-input" name="imagen" th:value="${noticia.imagen}"
                        required />
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="/novedades" class="btn btn-outline-secondary github-btn-outline">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-libreria">
                        Guardar Noticia
                    </button>
                </div>

            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
